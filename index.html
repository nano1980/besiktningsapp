<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Besiktningstider</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f3ee;--card:#fff;--green:#3d7a3a;--green-light:#edf5ec;--green-dark:#2a5528;--border:#e0ddd6;--text:#1a1a18;--muted:#888880;--error:#c0392b}
html,body{min-height:100vh;background:#e8e5df;color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden}
body{display:flex;justify-content:center}
.app{width:100%;max-width:600px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.15)}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;will-change:transform;overflow:hidden}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.gone{transform:translateX(-8%);opacity:0;pointer-events:none}
.topbar{display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.back-btn{width:36px;height:36px;border:none;background:var(--bg);border-radius:50%;display:grid;place-items:center;cursor:pointer;color:var(--text);flex-shrink:0;transition:background .15s}
.back-btn:hover{background:var(--border)}
.back-btn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.03em}
.topbar-sub{font-size:.72rem;color:var(--muted);margin-top:.05rem}
.scroll{flex:1;overflow-y:auto;padding:1.25rem;-webkit-overflow-scrolling:touch}
.logo-wrap{display:flex;align-items:center;gap:.55rem;margin-bottom:1.75rem}
.logo-icon{width:40px;height:40px;background:var(--green);border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.logo-icon svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text)}
.logo-text span{color:var(--green)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 20px rgba(0,0,0,.06);padding:1.5rem}
.field{margin-bottom:1.1rem}
label{display:block;font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.plate-wrap{display:flex;width:100%;border:2px solid #bbb;border-radius:8px;overflow:hidden;background:#fff;transition:border-color .15s,box-shadow .15s}
.plate-wrap:focus-within{border-color:#888;box-shadow:0 0 0 3px rgba(0,0,0,.08)}
.plate-wrap.invalid{border-color:var(--error)!important}
.plate-eu{background:#003f87;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 9px;gap:2px;flex-shrink:0}
.plate-eu-stars{font-size:6px;color:#fc0;line-height:1;letter-spacing:1.5px}
.plate-eu-s{font-size:10px;font-weight:700;color:#fff;line-height:1}
.plate-input{flex:1;border:none!important;border-radius:0!important;padding:.75rem;font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;background:#fff;color:#111;outline:none!important;box-shadow:none!important;-webkit-appearance:none}
.plate-input::placeholder{color:#ccc;letter-spacing:.1em;font-weight:400;font-size:1.3rem}
select{width:100%;background:#fafaf8;border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:1rem;padding:.72rem .9rem;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none}
select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(61,122,58,.1)}
select.invalid{border-color:var(--error)!important}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:.9rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem;pointer-events:none}
.err{font-size:.72rem;color:var(--error);margin-top:.3rem;display:none}
.err.show{display:block}
.btn{width:100%;margin-top:.4rem;background:var(--green);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:8px;padding:.9rem 1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:background .15s}
.btn:hover{background:var(--green-dark)}
.btn:disabled{background:#aab5a9;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;flex-shrink:0}
.btn.loading .spinner{display:block}
.btn.loading .btn-label{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.api-err{margin-top:1rem;background:#fdf0ef;border:1px solid #f5c6c3;border-radius:8px;padding:.75rem 1rem;font-size:.8rem;color:var(--error);display:none}
.api-err.show{display:block}
.next-banner{background:var(--green-light);border:1px solid rgba(61,122,58,.18);border-radius:10px;padding:1rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.9rem}
.next-icon{width:40px;height:40px;background:var(--green);border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.next-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.next-label{font-size:.63rem;letter-spacing:.13em;text-transform:uppercase;color:var(--green-dark);font-weight:600;margin-bottom:.15rem}
.next-value{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text)}
.results-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.results-title{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.count-pill{font-size:.68rem;font-weight:600;background:var(--green-light);color:var(--green-dark);border:1px solid rgba(61,122,58,.2);border-radius:20px;padding:.15em .65em}
.slot-list{display:flex;flex-direction:column;gap:.4rem}
.slot{display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .12s,background .12s,transform .1s;-webkit-tap-highlight-color:transparent}
.slot:hover{border-color:#b5d4b4;background:#f4faf3}
.slot:active{transform:scale(.99)}
.slot-left{display:flex;flex-direction:column;gap:.1rem;min-width:0;flex:1}
.slot-date{font-size:.72rem;color:var(--muted)}
.slot-station{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-right{display:flex;flex-direction:column;align-items:flex-end;gap:.1rem;flex-shrink:0}
.slot-time{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;color:var(--green-dark)}
.slot-price{font-size:.72rem;color:var(--muted)}
.slot-arrow{color:#ccc;flex-shrink:0;font-size:1.2rem;margin-left:.1rem}
.no-slots{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.85rem}
.confirm-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem}
.confirm-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:1.25rem}
.confirm-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
.confirm-row:last-child{border-bottom:none}
.confirm-icon{width:32px;height:32px;background:var(--green-light);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.confirm-icon svg{width:16px;height:16px;stroke:var(--green-dark);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.confirm-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.15rem}
.confirm-value{font-weight:500;color:var(--text);font-size:.95rem}
/* ── Loader ── */
.loader-overlay{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:100;transition:opacity .3s}
.loader-overlay.hidden{opacity:0;pointer-events:none}
.loader-title{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:700;color:var(--text);letter-spacing:.05em;transition:opacity .3s ease}
.loader-sub{font-size:.8rem;color:var(--muted);margin-top:-.5rem;text-align:center;max-width:240px;line-height:1.5;transition:opacity .3s ease}
.road{width:240px;height:56px;position:relative;overflow:hidden}
.road-line{position:absolute;bottom:6px;left:0;right:0;height:3px;background:var(--border);border-radius:2px}
.road-dashes{position:absolute;bottom:9px;left:0;display:flex;gap:14px;animation:road .9s linear infinite}
.road-dash{width:20px;height:2px;background:#c8c2b4;border-radius:1px;flex-shrink:0}
.car{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);animation:bounce .5s ease-in-out infinite alternate}
.car svg{width:52px;height:30px}
.exhaust{position:absolute;bottom:20px;left:calc(50% - 38px);display:flex;gap:3px}
.puff{width:6px;height:6px;background:#d0ccc4;border-radius:50%;animation:puff .9s ease-out infinite}
.puff:nth-child(2){animation-delay:.18s;width:5px;height:5px}
.puff:nth-child(3){animation-delay:.36s;width:4px;height:4px}
@keyframes road{from{transform:translateX(0)}to{transform:translateX(-34px)}}
@keyframes bounce{from{transform:translateX(-50%) translateY(0)}to{transform:translateX(-50%) translateY(-2px)}}
@keyframes puff{0%{opacity:.8;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateX(-18px) scale(2.2)}}
.footer-txt{margin-top:.75rem;text-align:center;font-size:.68rem;color:var(--muted)}
</style>
</head>
<body>
<div class="app">

<!-- LOADER -->
<div class="loader-overlay hidden" id="loader">
  <div class="loader-title" id="loader-title">Söker tider…</div>
  <div class="road">
    <div class="exhaust"><div class="puff"></div><div class="puff"></div><div class="puff"></div></div>
    <div class="car">
      <svg viewBox="0 0 56 32" fill="none">
        <rect x="8" y="14" width="40" height="14" rx="3" fill="#3d7a3a"/>
        <path d="M14 14 L18 6 L38 6 L42 14Z" fill="#2a5528"/>
        <rect x="19" y="7" width="8" height="6" rx="1" fill="#a8d5a5" opacity=".7"/>
        <rect x="29" y="7" width="8" height="6" rx="1" fill="#a8d5a5" opacity=".7"/>
        <circle cx="16" cy="28" r="4" fill="#1a1a18"/>
        <circle cx="16" cy="28" r="2" fill="#888"/>
        <circle cx="40" cy="28" r="4" fill="#1a1a18"/>
        <circle cx="40" cy="28" r="2" fill="#888"/>
        <rect x="42" y="18" width="5" height="3" rx="1" fill="#f5c842" opacity=".9"/>
        <rect x="9" y="18" width="3" height="3" rx="1" fill="#e05050" opacity=".7"/>
      </svg>
    </div>
    <div class="road-line"></div>
    <div class="road-dashes">
      <div class="road-dash"></div><div class="road-dash"></div><div class="road-dash"></div>
      <div class="road-dash"></div><div class="road-dash"></div><div class="road-dash"></div>
      <div class="road-dash"></div><div class="road-dash"></div>
    </div>
  </div>
  <div class="loader-sub" id="loader-sub"></div>
</div>

<!-- SCREEN 1: SÖK -->
<div class="screen" id="screen-search">
  <div class="scroll">
    <div class="logo-wrap">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M5 11l2-5h10l2 5"/><rect x="2" y="11" width="20" height="7" rx="2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg></div>
      <div class="logo-text">Besiktning<span>.nu</span></div>
    </div>
    <div class="card">
      <div class="field">
        <label for="reg">Registreringsnummer</label>
        <div class="plate-wrap" id="plate-wrap">
          <div class="plate-eu"><div class="plate-eu-stars">★★★</div><div class="plate-eu-s">S</div></div>
          <input type="text" id="reg" class="plate-input" placeholder="ABC 123" maxlength="10" autocomplete="off" spellcheck="false"/>
        </div>
        <div class="err" id="reg-err">Ange ett registreringsnummer</div>
      </div>
      <div class="field">
        <label for="city">Stad</label>
        <div class="select-wrap">
          <select id="city">
            <option value="">— Välj stad —</option>
            <optgroup label="Storstäder"><option>Stockholm</option><option>Göteborg</option><option>Malmö</option></optgroup>
            <optgroup label="Övriga städer">
              <option>Uppsala</option><option>Västerås</option><option>Örebro</option>
              <option>Linköping</option><option>Helsingborg</option><option>Jönköping</option>
              <option>Norrköping</option><option>Lund</option><option>Umeå</option>
              <option>Gävle</option><option>Borås</option><option>Sundsvall</option>
              <option>Östersund</option><option>Karlstad</option><option>Halmstad</option>
              <option>Falun</option><option>Luleå</option><option>Kalmar</option>
              <option>Växjö</option><option>Eskilstuna</option>
            </optgroup>
          </select>
        </div>
        <div class="err" id="city-err">Välj en stad</div>
      </div>
      <button class="btn" id="search-btn" type="button">
        <div class="spinner"></div><span class="btn-label">Sök lediga tider</span>
      </button>
      <div class="api-err" id="api-err"></div>
    </div>
    <div class="footer-txt">Ansluter till lokal API · carspect.se</div>
  </div>
</div>

<!-- SCREEN 2: RESULTAT -->
<div class="screen hidden" id="screen-results">
  <div class="topbar">
    <button class="back-btn" id="back-to-search"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div><div class="topbar-title" id="results-topbar-title">Lediga tider</div><div class="topbar-sub" id="results-topbar-sub"></div></div>
  </div>
  <div class="scroll">
    <div class="next-banner">
      <div class="next-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <div><div class="next-label">Närmast i tid</div><div class="next-value" id="next-val">—</div></div>
    </div>
    <div class="results-head">
      <span class="results-title">Välj en tid</span>
      <span class="count-pill" id="count">0 tider</span>
    </div>
    <div class="slot-list" id="slot-list"></div>
  </div>
</div>

<!-- SCREEN 3: BEKRÄFTA -->
<div class="screen hidden" id="screen-confirm">
  <div class="topbar">
    <button class="back-btn" id="back-to-results"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div><div class="topbar-title">Bekräfta bokning</div><div class="topbar-sub">Granska innan du fortsätter</div></div>
  </div>
  <div class="scroll">
    <div class="confirm-card">
      <div class="confirm-title">Bokningsdetaljer</div>
      <div class="confirm-row">
        <div class="confirm-icon"><svg viewBox="0 0 24 24"><path d="M5 11l2-5h10l2 5"/><rect x="2" y="11" width="20" height="7" rx="2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg></div>
        <div><div class="confirm-label">Fordon</div><div class="confirm-value" id="c-reg">—</div></div>
      </div>
      <div class="confirm-row">
        <div class="confirm-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 13 8 13s8-7.75 8-13a8 8 0 0 0-8-8z"/></svg></div>
        <div><div class="confirm-label">Station</div><div class="confirm-value" id="c-station">—</div></div>
      </div>
      <div class="confirm-row">
        <div class="confirm-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div><div class="confirm-label">Datum</div><div class="confirm-value" id="c-date">—</div></div>
      </div>
      <div class="confirm-row">
        <div class="confirm-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div><div class="confirm-label">Tid</div><div class="confirm-value" id="c-time">—</div></div>
      </div>
      <div class="confirm-row">
        <div class="confirm-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <div><div class="confirm-label">Pris</div><div class="confirm-value" id="c-price">—</div></div>
      </div>
    </div>
    <button class="btn" id="book-btn" type="button">
      <div class="spinner"></div><span class="btn-label">Gå till betalning →</span>
    </button>
    <div class="api-err" id="book-err"></div>
  </div>
</div>

</div>

<script>
const API = "http://localhost:3000";
let state = { reg: "", city: "", slots: [], selected: null };
const regEl = document.getElementById("reg");
const cityEl = document.getElementById("city");
const plateWrap = document.getElementById("plate-wrap");
const loader = document.getElementById("loader");
const loaderTitle = document.getElementById("loader-title");
const loaderSub = document.getElementById("loader-sub");
let stepInterval = null;

const SEARCH_STEPS = [
  { title: "Letar upp stationer…",      sub: "Hittar alla besiktningsstationer i området" },
  { title: "Söker närmaste tider…",     sub: "Kontrollerar tillgänglighet hos varje station" },
  { title: "Jämför alternativ…",        sub: "Sorterar efter datum och bästa pris" },
  { title: "Sammanställer resultaten…", sub: "Nästan klart — hämtar sista tiderna" },
];

function animateLoader(steps, loop) {
  let i = 0;
  loaderTitle.textContent = steps[0].title;
  loaderSub.textContent = steps[0].sub;
  loaderTitle.style.opacity = "1";
  loaderSub.style.opacity = "1";
  clearInterval(stepInterval);
  stepInterval = setInterval(() => {
    if (!loop && i >= steps.length - 1) return;
    i = loop ? (i + 1) % steps.length : Math.min(i + 1, steps.length - 1);
    loaderTitle.style.opacity = "0";
    loaderSub.style.opacity = "0";
    setTimeout(() => {
      loaderTitle.textContent = steps[i].title;
      loaderSub.textContent = steps[i].sub;
      loaderTitle.style.opacity = "1";
      loaderSub.style.opacity = "1";
    }, 300);
  }, 2500);
}

function showLoader(steps, loop = true) {
  loader.classList.remove("hidden");
  animateLoader(steps, loop);
}

function hideLoader() {
  clearInterval(stepInterval);
  stepInterval = null;
  loader.classList.add("hidden");
}

function showScreen(id, direction) {
  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("hidden","gone");
    if (s.id !== id) s.classList.add(direction === "back" ? "hidden" : "gone");
  });
  document.getElementById(id).classList.remove("hidden","gone");
  document.getElementById(id).querySelector(".scroll")?.scrollTo(0, 0);
}

regEl.addEventListener("input", () => {
  regEl.value = regEl.value.toUpperCase().replace(/[^A-Z0-9]/g,"");
  plateWrap.classList.remove("invalid");
  document.getElementById("reg-err").classList.remove("show");
});
cityEl.addEventListener("change", () => {
  cityEl.classList.remove("invalid");
  document.getElementById("city-err").classList.remove("show");
});

document.getElementById("search-btn").addEventListener("click", async () => {
  let ok = true;
  if (!regEl.value.trim() || regEl.value.trim().length < 2) { plateWrap.classList.add("invalid"); document.getElementById("reg-err").classList.add("show"); ok=false; }
  if (!cityEl.value) { cityEl.classList.add("invalid"); document.getElementById("city-err").classList.add("show"); ok=false; }
  if (!ok) return;
  state.reg = regEl.value.trim();
  state.city = cityEl.value;
  showLoader(SEARCH_STEPS, true);
  document.getElementById("api-err").classList.remove("show");
  try {
    const r = await fetch(`${API}/timeslots?reg=${encodeURIComponent(state.reg)}&location=${encodeURIComponent(state.city)}`);
    const d = await r.json();
    if (!r.ok || !d.success) throw new Error(d.error || "Något gick fel");
    state.slots = d.timeslots ?? [];
    hideLoader();
    renderResults();
    showScreen("screen-results","forward");
  } catch(e) {
    hideLoader();
    document.getElementById("api-err").textContent = "⚠ " + e.message;
    document.getElementById("api-err").classList.add("show");
  }
});

document.getElementById("back-to-search").addEventListener("click", () => showScreen("screen-search","back"));
document.getElementById("back-to-results").addEventListener("click", () => showScreen("screen-results","back"));

function renderResults() {
  const slots = state.slots;
  document.getElementById("count").textContent = slots.length + " tider";
  document.getElementById("results-topbar-title").textContent = state.city + " — " + state.reg;
  document.getElementById("results-topbar-sub").textContent = slots.length + " lediga tider hittades";
  const list = document.getElementById("slot-list");
  list.innerHTML = "";
  if (!slots.length) {
    document.getElementById("next-val").textContent = "—";
    list.innerHTML = '<div class="no-slots">Inga lediga tider hittades.</div>';
    return;
  }
  document.getElementById("next-val").textContent = slots[0].date + "  " + slots[0].time;
  slots.forEach(s => {
    const el = document.createElement("div");
    el.className = "slot";
    el.innerHTML =
      '<div class="slot-left">' +
        '<span class="slot-date">' + s.date + '</span>' +
        '<span class="slot-station">' + s.station + '</span>' +
      '</div>' +
      '<div class="slot-right">' +
        '<span class="slot-time">' + s.time + '</span>' +
        '<span class="slot-price">' + (s.price||"") + '</span>' +
      '</div>' +
      '<span class="slot-arrow">›</span>';
    el.addEventListener("click", () => selectSlot(s));
    list.appendChild(el);
  });
}

function selectSlot(slot) {
  state.selected = slot;
  document.getElementById("c-reg").textContent = state.reg + " · Kontrollbesiktning";
  document.getElementById("c-station").textContent = slot.station;
  document.getElementById("c-date").textContent = slot.date;
  document.getElementById("c-time").textContent = slot.time;
  document.getElementById("c-price").textContent = slot.price || "—";
  document.getElementById("book-err").classList.remove("show");
  showScreen("screen-confirm","forward");
}

document.getElementById("book-btn").addEventListener("click", async () => {
  const s = state.selected;
  if (!s) return;
  const btn = document.getElementById("book-btn");
  btn.disabled = true;
  btn.classList.add("loading");
  btn.querySelector(".btn-label").textContent = "Navigerar…";

  showLoader([
    { title: "Reserverar din tid…",      sub: "Navigerar till " + s.station },
    { title: "Sammanställer bokningen…", sub: "Väljer " + s.time + " åt dig" },
    { title: "Länkar till betalsidan…",  sub: "Förbereder betalning via Klarna" },
  ], false);

  try {
    const r = await fetch(API + "/book", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ reg: state.reg, station: s.station, date: s.date, time: s.time })
    });
    const d = await r.json();
    if (!r.ok || !d.success) throw new Error(d.error || "Bokningsfel");

    // Navigate directly in same tab — loader stays visible until page changes
    if (d.url) window.location.href = d.url;

  } catch(e) {
    hideLoader();
    document.getElementById("book-err").textContent = "⚠ " + e.message;
    document.getElementById("book-err").classList.add("show");
    btn.disabled = false;
    btn.classList.remove("loading");
    btn.querySelector(".btn-label").textContent = "Gå till betalning →";
  }
});
</script>
</body>
</html>
